{% load static %}
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>글 수정 - 에브리타임</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}" />
    <link rel="stylesheet" href="{% static 'css/post.css' %}" />
    <script src="{% static 'js/main.js' %}" defer></script>
  </head>

  <body>
    {% include "header.html" %}
    {% include "navigation.html" %}

    <div class="main_part">
      <section class="secret_board">
        <header class="header_for_sb_category">
          <p>글 수정하기</p>
        </header>

        <div class="writing_zone" id="writing_area">
          <form method="POST" action="{% url 'posts:update' post.id %}" enctype="multipart/form-data">
            {% csrf_token %}
            
            <input type="text" name="title" class="title" value="{{ post.title }}" placeholder="글 제목" required />
            
            <textarea name="content" class="main_content" placeholder="내용을 입력하세요" required>{{ post.content }}</textarea>
            
            <div class="file_status" style="padding: 10px; font-size: 13px; color: #666;">
                {% if post.image %}
                    <p>기존 이미지: <a href="{{ post.image.url }}" target="_blank">파일 확인</a></p>
                {% endif %}
                <label>이미지 변경: <input type="file" name="image"></label>
                
                <br><br>
                
                {% if post.video %}
                    <p>기존 비디오: <a href="{{ post.video.url }}" target="_blank">파일 확인</a></p>
                {% endif %}
                <label>비디오 변경: <input type="file" name="video"></label>
            </div>

            <div class="bottom_option">
              <div class="notClip">
                <div class="options">
                  <div class="anonymous">
                    <input type="checkbox" name="is_anonymous" class="check_for_anonymous" {% if post.is_anonymous %} checked {% endif %}>
                    <div class="anonymous_text">익명</div>
                  </div>
                </div>

                <button type="submit" class="submit" style="background: none; border: none; cursor: pointer;">
                  <img src="{% static 'img/container.articles.write.submit.png' %}" alt="수정완료">
                </button>
              </div>
            </div>
          </form>
        </div>
      </section>

      {% include "aside.html" %}
    </div>
  </body>
</html>
