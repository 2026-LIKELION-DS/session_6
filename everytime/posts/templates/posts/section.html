{% load static %}
{% load humanize %}
<main class="content-wrap">
  <section class="left-board">
    <div class="board-title"><h2>비밀게시판</h2></div>

    <div class="empty-box-large">
      <div class="box2">
        <div class="recent-posts">
          <img src="{% static 'img/비밀게시판 로고.png' %}" />
          <div class="recent-post-item">
            <p>글사이 ㅅㄹㅅㄹ 기사 어떻게 쓰나요??</p>
          </div>
          <div class="recent-post-item"><p>보건실가면 마스크</p></div>
          <div class="recent-post-item"><p>학교 헬스장</p></div>
          <div class="recent-post-item"><p>온강 출결</p></div>
        </div>
        <div class="fire">
          <img src="{% static 'img/비밀게시판 불.png' %}" />
          <div class="fire-post-item">
            <div class="fire-chat">
              <p>정말 감동이네요</p>
              <img src="{% static 'img/좋아요 189.png' %}" />
              <p class="Red">189</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    {% include "posts/post.html" %}

    <div class="post-list">
      {% for post in posts %}
      <div class="post">
        <a href="{% url 'posts:detail' post.id %}">
          <h3>{{ post.title }}</h3>
        </a>
        <p>{{ post.content }}</p>
        <span>{{ post.created_at|naturaltime }} 익명</span>
      </div>
      {% empty %}
      <p>글이 없습니다.</p>
      {% endfor %}
    </div>
  </section>
</main>
