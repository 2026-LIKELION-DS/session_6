{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoginPage</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}"/>
</head>
<body>
<div class="wrapper">
    <header>
        <div class="logoImgBox"><img src="{% static 'img/logo_light.png' %}" alt="log" width="210" height="56"> </div>
    </header>

    <section>
    <form method='post' action= "{% url 'accounts:login' %}" class="section-container"> 
        {% csrf_token %}
        <input type="text" name="username" placeholder="LIKELION13" class="input-login"></input>
        <input type="password" name="password" placeholder="비밀번호" class="input-login input-pw"></input>
        <input type="submit" name="제출버튼" value="에브리타임 로그인" class="inputSubmit"></input>
        <a href="{% url 'accounts:signup' %}" class="signup-txt">회원가입</a>
    </form>
    </section>

    <footer>
        <div class="footer-box">
            <p class="footer-txt">이용약관</p>
            <p class="footer-txt footerBold">개인정보처리방침</p>
            <p class="footer-txt">문의하기</p>
            <p class="footer-txt footerBold">@에브리타임</p>
        </div>
        
    </footer>
    <script src="{% static 'js/login.js' %}"></script>
</div>
</body>
</html>
