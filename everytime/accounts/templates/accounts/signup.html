{% comment %} <h2>회원가입</h2>
<form method='post' action={% url 'accounts:signup' %}>
    {% csrf_token %}
    {{ form.as_p }}
    <button type='submit'>signup</button>
</form> {% endcomment %}
{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 에브리타임</title>
    <link rel="stylesheet" href="{% static 'css/signup.css' %}"/>
</head>
<body>
    <div class="page">
        <div class="container">
            <section>
                <h2>에브리타임 회원가입</h2>
                <p>에브리타임 계정으로 <strong>캠퍼스픽, 에브리타임</strong>등 
                    <br> 다양한 대학생 서비스를 모두 이용하실 수 있습니다.</p>
                <form method='post' action={% url 'accounts:signup' %} class="signup">
                    {% csrf_token %}
                    <div class="input_group">
                        <p>이름</p>
                        <input type="text" id="username" name="username" class="input" placeholder="이름을 입력하세요."/>
                    </div>
                    <div class="input_group">
                        <p>닉네임</p>
                        <input type="text" id="nickname" name="nickname" class="input" placeholder="닉네임을 입력하세요."/>
                    </div>
                    <div class="input_group">
                        <p>이메일</p>
                        <input type="text" id="email" name="email" class="input" placeholder="이메일을 입력하세요."/>
                    </div>
                    <div class="input_group">
                        <p>비밀번호</p>
                    <input type="password" id="password1" name="password1" class="input" placeholder="숫자/문자 조합, 최소 8자 이상"/>
                    </div>
                    <div class="input_group">
                        <p>비밀번호 재입력</p>
                        <input type="password" id="password2" name="password2" class="input" placeholder="비밀번호를 재입력하세요."/>
                    </div>
                    <button type="submit" class="signup_btn">회원가입</button>
                </form>
            </section>
        </div>
    </div>
    <script src="{% static 'js/signup.js' %}" defer></script>
</body>
</html>
