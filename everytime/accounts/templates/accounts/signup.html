{% comment %} <h2>회원가입</h2>
<form method='post' action={% url 'accounts:signup' %}>
    {% csrf_token %}
    {{ form.as_p }}
    <button type='submit'>signup</button>
</form> {% endcomment %}

{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에브리타임 회원가입 클론</title>
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
</head>
<body>
    <div class="signup-container">
        <div class="header-section">
            <h2 class="title">에브리타임 회원가입</h2>
            <p class="subtitle">에브리타임 계정으로 <b>캠퍼스픽, 에브리타임</b> 등<br>다양한 대학생 서비스를 모두 이용하실 수 있습니다.</p>
        </div>

        <form action={% url 'accounts:signup' %}  method="POST" id="signupForm" class="form-box">
            {% csrf_token %}
            <div class="input-group">
                <label>이름</label>
                <input name="username"  type="text" class="text-input" placeholder="이름을 입력하세요.">
            </div>
            <div class="input-group">
                <label>닉네임</label>
                <input name="nickname" type="text" class="text-input" placeholder="닉네임을 입력하세요.">
            </div>
            <div class="input-group">
                <label>이메일</label>
                <input name="email" type="email" class="text-input" placeholder="이메일을 입력하세요.">
            </div>
            <div class="input-group">
                <label>비밀번호</label>
                <input name="password1" type="password" id="signupPw" class="text-input" placeholder="숫자/영문 조합, 최소 8자 이상">
            </div>
            <div class="input-group">
                <label>비밀번호 재확인</label>
                <input name="password2" type="password" id="signupPwCheck" class="text-input" placeholder="비밀번호를 재입력하세요.">
            </div>
            
            <input type="submit" id="signupBtn" value="회원가입" class="submit-btn" disabled>
        </form>
    </div>

    <script src="{% static 'js/signup.js' %}"></script>
</body>
</html>
